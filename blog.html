<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog — AstraGold LLC</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #8a6f2e;
      --black: #0a0a0a;
      --dark: #111111;
      --dark2: #1a1a1a;
      --dark3: #222222;
      --text: #e8e0d0;
      --text-muted: #8a8070;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--dark);
      border-bottom: 1px solid #2a2a2a;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }

    /* HERO */
    .hero {
      padding: 5rem 2rem 3rem;
      text-align: center;
      border-bottom: 1px solid #1e1e1e;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 1rem;
    }
    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* MAIN */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #2a2a2a;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* POSTS GRID */
    .posts-grid {
      display: grid;
      gap: 2rem;
    }

    .post-card {
      background: var(--dark2);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      display: grid;
      grid-template-columns: 1fr;
    }
    .post-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-2px);
    }
    .post-card.has-image {
      grid-template-columns: 280px 1fr;
    }
    @media (max-width: 600px) {
      .post-card.has-image { grid-template-columns: 1fr; }
    }
    .post-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }
    .post-card.has-image .post-image { height: 100%; min-height: 180px; }
    .post-body { padding: 1.8rem; }
    .post-meta {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .post-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.8rem;
      line-height: 1.3;
    }
    .post-excerpt {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 1.2rem;
    }
    .read-more {
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    .modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
    .modal {
      background: var(--dark2);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      max-width: 760px;
      width: 100%;
      margin: auto;
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    .modal-close {
      position: sticky;
      top: 0;
      background: var(--dark2);
      border-bottom: 1px solid #2a2a2a;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .modal-close span { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .close-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .close-btn:hover { border-color: var(--gold); color: var(--gold); }
    .modal-content { padding: 2.5rem; }
    .modal-meta { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 2rem;
      line-height: 1.2;
    }
    .modal-images { display: grid; gap: 1rem; margin-bottom: 2rem; }
    .modal-images img {
      width: 100%;
      border-radius: 2px;
      display: block;
    }
    .modal-images.two-images { grid-template-columns: 1fr 1fr; }
    .modal-text {
      color: var(--text);
      font-size: 1rem;
      line-height: 1.85;
      white-space: pre-wrap;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid #1e1e1e;
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">ASTRAGOLD LLC</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="drivers.html">Drivers</a></li>
    <li><a href="brokers.html">Brokers</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-label">AstraGold Updates</div>
  <h1>Our Blog</h1>
  <p>Industry insights, company news, and updates from the road.</p>
</div>

<div class="container">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Loading posts...</div>
  </div>
  <div class="posts-grid" id="postsGrid" style="display:none;"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="empty-icon">✍️</div>
    <p>No posts yet. Check back soon!</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-close">
      <span>AstraGold Blog</span>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<footer>
  © 2025 AstraGold LLC · <a href="index.html">Home</a> · <a href="admin.html">Admin</a>
</footer>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD9LUcJU8W57CYdP_xfYscxg-PzSPjTQi0",
    authDomain: "astragold-website.firebaseapp.com",
    projectId: "astragold-website",
    storageBucket: "astragold-website.firebasestorage.app",
    messagingSenderId: "982725379990",
    appId: "1:982725379990:web:191f4563c2eaf6d2aabfb7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allPosts = [];

  async function loadPosts() {
    try {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      allPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      document.getElementById('loading').style.display = 'none';

      if (allPosts.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      renderPosts(allPosts);
    } catch (e) {
      console.error(e);
      document.getElementById('loading').innerHTML = '<p style="color:#8a8070">Failed to load posts. Please try again later.</p>';
    }
  }

  function renderPosts(posts) {
    const grid = document.getElementById('postsGrid');
    grid.style.display = 'grid';
    grid.innerHTML = posts.map(post => {
      const date = post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) : '';
      const excerpt = post.body ? post.body.substring(0, 160) + (post.body.length > 160 ? '...' : '') : '';
      const hasImage = post.image1;
      return `
        <div class="post-card ${hasImage ? 'has-image' : ''}" onclick="openPost('${post.id}')">
          ${hasImage ? `<img src="${post.image1}" alt="${post.title}" class="post-image" onerror="this.style.display='none'"/>` : ''}
          <div class="post-body">
            <div class="post-meta">${date}</div>
            <div class="post-title">${post.title}</div>
            <div class="post-excerpt">${excerpt}</div>
            <div class="read-more">Read Article →</div>
          </div>
        </div>`;
    }).join('');
  }

  window.openPost = function(id) {
    const post = allPosts.find(p => p.id === id);
    if (!post) return;
    const date = post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) : '';
    const images = [post.image1, post.image2].filter(Boolean);
    const imgHtml = images.length > 0 ? `
      <div class="modal-images ${images.length === 2 ? 'two-images' : ''}">
        ${images.map(src => `<img src="${src}" alt="" onerror="this.style.display='none'"/>`).join('')}
      </div>` : '';
    document.getElementById('modalContent').innerHTML = `
      <div class="modal-meta">${date}</div>
      <div class="modal-title">${post.title}</div>
      ${imgHtml}
      <div class="modal-text">${post.body || ''}</div>
    `;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeModal = function(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  };
  window.closeModalDirect = function() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };

  loadPosts();
</script>
</body>
</html>
