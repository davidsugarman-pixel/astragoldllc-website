<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — AstraGold Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #8a6f2e;
      --black: #0a0a0a;
      --dark: #111111;
      --dark2: #1a1a1a;
      --dark3: #222222;
      --text: #e8e0d0;
      --text-muted: #8a8070;
      --danger: #c0392b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; }

    /* LOGIN */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: var(--dark2);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }
    .login-sub { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2.5rem; }
    .login-box input {
      width: 100%;
      background: var(--dark3);
      border: 1px solid #2a2a2a;
      color: var(--text);
      padding: 0.9rem 1.2rem;
      border-radius: 3px;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .login-box input:focus { outline: none; border-color: var(--gold); }
    .btn-gold {
      width: 100%;
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 0.9rem;
      border-radius: 3px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-gold:hover { background: var(--gold-light); }
    .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.8rem; display: none; }

    /* ADMIN LAYOUT */
    .admin-screen { display: none; min-height: 100vh; }
    nav {
      background: var(--dark);
      border-bottom: 1px solid #2a2a2a;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); }
    .nav-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-outline {
      background: none;
      border: 1px solid #2a2a2a;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border-radius: 3px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-sm {
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 3px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-sm:hover { background: var(--gold-light); }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; display: grid; grid-template-columns: 1fr 360px; gap: 2rem; }
    @media (max-width: 780px) { .admin-body { grid-template-columns: 1fr; } }

    /* EDITOR */
    .panel {
      background: var(--dark2);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 2rem;
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #2a2a2a;
    }
    .form-group { margin-bottom: 1.3rem; }
    .form-group label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      background: var(--dark3);
      border: 1px solid #2a2a2a;
      color: var(--text);
      padding: 0.8rem 1rem;
      border-radius: 3px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
    .form-group textarea { min-height: 220px; line-height: 1.7; }
    .form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem; }
    .publish-bar { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .publish-bar .btn-gold { width: auto; flex: 1; }
    .btn-reset { background: none; border: 1px solid #2a2a2a; color: var(--text-muted); padding: 0.8rem 1.5rem; border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif; font-size: 0.85rem; transition: border-color 0.2s; }
    .btn-reset:hover { border-color: #444; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--dark2);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      padding: 1rem 1.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* POSTS LIST */
    .post-item {
      border-bottom: 1px solid #222;
      padding: 1rem 0;
    }
    .post-item:last-child { border-bottom: none; }
    .post-item-title { font-weight: 500; color: #fff; font-size: 0.95rem; margin-bottom: 0.3rem; line-height: 1.3; }
    .post-item-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.6rem; }
    .post-item-actions { display: flex; gap: 0.5rem; }
    .btn-delete {
      background: none;
      border: 1px solid #3a1a1a;
      color: #c0392b;
      padding: 0.3rem 0.8rem;
      border-radius: 2px;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #2a0a0a; }
    .posts-empty { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 2rem 0; }
    .spinner { width: 24px; height: 24px; border: 2px solid #2a2a2a; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 1.5rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ASTRAGOLD LLC</div>
    <div class="login-sub">Blog Admin</div>
    <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-gold" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <nav>
    <div class="nav-logo">ASTRAGOLD — Blog Admin</div>
    <div class="nav-actions">
      <a href="blog.html" class="btn-outline" target="_blank">View Blog</a>
      <button class="btn-outline" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="admin-body">
    <!-- EDITOR -->
    <div class="panel">
      <div class="panel-title" id="editorTitle">New Post</div>
      <input type="hidden" id="editId"/>
      <div class="form-group">
        <label>Post Title</label>
        <input type="text" id="postTitle" placeholder="e.g. Spring Shipping Season Tips"/>
      </div>
      <div class="form-group">
        <label>Article Body</label>
        <textarea id="postBody" placeholder="Write your article here..."></textarea>
      </div>
      <div class="form-group">
        <label>Image 1 <span style="color:var(--text-muted);font-size:0.7rem;text-transform:none;">(optional)</span></label>
        <input type="file" id="postImage1File" accept="image/*" style="display:none;" onchange="handleImgPreview(this,'postImage1','img1Preview','img1UploadStatus')" />
        <div style="display:flex;gap:0.6rem;align-items:center;margin-bottom:0.5rem;">
          <label for="postImage1File" style="background:transparent;border:1px solid #2a2a2a;color:var(--text-muted);padding:0.5rem 1rem;font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s;font-family:inherit;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='#2a2a2a'">📎 Upload File</label>
          <span style="color:var(--text-muted);font-size:0.75rem;">or</span>
          <input type="url" id="postImage1" placeholder="Paste image URL" style="flex:1;"/>
        </div>
        <div id="img1UploadStatus" style="display:none;font-size:0.78rem;color:var(--gold);margin-bottom:0.4rem;"></div>
        <img id="img1Preview" src="" alt="" style="display:none;max-height:100px;border:1px solid #2a2a2a;margin-top:0.4rem;" />
      </div>
      <div class="form-group">
        <label>Image 2 <span style="color:var(--text-muted);font-size:0.7rem;text-transform:none;">(optional)</span></label>
        <input type="file" id="postImage2File" accept="image/*" style="display:none;" onchange="handleImgPreview(this,'postImage2','img2Preview','img2UploadStatus')" />
        <div style="display:flex;gap:0.6rem;align-items:center;margin-bottom:0.5rem;">
          <label for="postImage2File" style="background:transparent;border:1px solid #2a2a2a;color:var(--text-muted);padding:0.5rem 1rem;font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s;font-family:inherit;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='#2a2a2a'">📎 Upload File</label>
          <span style="color:var(--text-muted);font-size:0.75rem;">or</span>
          <input type="url" id="postImage2" placeholder="Paste image URL" style="flex:1;"/>
        </div>
        <div id="img2UploadStatus" style="display:none;font-size:0.78rem;color:var(--gold);margin-bottom:0.4rem;"></div>
        <img id="img2Preview" src="" alt="" style="display:none;max-height:100px;border:1px solid #2a2a2a;margin-top:0.4rem;" />
      </div>
      <div class="publish-bar">
        <button class="btn-gold" onclick="publishPost()">Publish Post</button>
        <button class="btn-reset" onclick="resetForm()">Clear</button>
      </div>
    </div>

    <!-- POSTS LIST -->
    <div class="panel">
      <div class="panel-title">Published Posts</div>
      <div class="spinner" id="listSpinner"></div>
      <div id="postsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const ADMIN_PASSWORD = "carhauler";

  const firebaseConfig = {
    apiKey: "AIzaSyD9LUcJU8W57CYdP_xfYscxg-PzSPjTQi0",
    authDomain: "astragold-website.firebaseapp.com",
    projectId: "astragold-website",
    storageBucket: "astragold-website.firebasestorage.app",
    messagingSenderId: "982725379990",
    appId: "1:982725379990:web:191f4563c2eaf6d2aabfb7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Upload file to Storage, put URL into the URL input
  window.handleImgPreview = function(fileInput, urlInputId, previewId, statusId) {
    const file = fileInput.files[0];
    if (!file) return;
    const statusEl = document.getElementById(statusId);
    const previewEl = document.getElementById(previewId);
    statusEl.style.display = 'block';
    statusEl.textContent = 'Uploading…';
    const path = `blog_images/${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi,'_')}`;
    const task = uploadBytesResumable(ref(storage, path), file);
    task.on('state_changed',
      snap => { statusEl.textContent = `Uploading… ${Math.round(snap.bytesTransferred/snap.totalBytes*100)}%`; },
      err => { statusEl.textContent = 'Upload failed: ' + err.message; },
      async () => {
        const url = await getDownloadURL(task.snapshot.ref);
        document.getElementById(urlInputId).value = url;
        statusEl.textContent = '✓ Uploaded';
        previewEl.src = url;
        previewEl.style.display = 'block';
      }
    );
  };
  let posts = [];

  // AUTH
  window.login = function() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadPosts();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  };

  window.logout = function() {
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
  };

  // LOAD
  async function loadPosts() {
    document.getElementById('listSpinner').style.display = 'block';
    document.getElementById('postsList').innerHTML = '';
    try {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList();
    } catch(e) {
      document.getElementById('postsList').innerHTML = '<p style="color:#c0392b;font-size:.85rem">Error loading posts.</p>';
    }
    document.getElementById('listSpinner').style.display = 'none';
  }

  function renderList() {
    const el = document.getElementById('postsList');
    if (!posts.length) {
      el.innerHTML = '<div class="posts-empty">No posts yet. Write your first one!</div>';
      return;
    }
    el.innerHTML = posts.map(p => {
      const date = p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : 'Draft';
      return `
        <div class="post-item">
          <div class="post-item-title">${p.title}</div>
          <div class="post-item-date">${date}</div>
          <div class="post-item-actions">
            <button class="btn-delete" onclick="deletePost('${p.id}')">Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  // PUBLISH
  window.publishPost = async function() {
    const title = document.getElementById('postTitle').value.trim();
    const body = document.getElementById('postBody').value.trim();
    const image1 = document.getElementById('postImage1').value.trim();
    const image2 = document.getElementById('postImage2').value.trim();

    if (!title) { showToast('Please enter a title.'); return; }
    if (!body) { showToast('Please write some content.'); return; }

    const btn = document.querySelector('.publish-bar .btn-gold');
    btn.textContent = 'Publishing...';
    btn.disabled = true;

    try {
      await addDoc(collection(db, "posts"), {
        title,
        body,
        image1: image1 || null,
        image2: image2 || null,
        createdAt: serverTimestamp()
      });
      showToast('✓ Post published successfully!');
      resetForm();
      loadPosts();
    } catch(e) {
      showToast('Error publishing post. Try again.');
    }
    btn.textContent = 'Publish Post';
    btn.disabled = false;
  };

  // DELETE
  window.deletePost = async function(id) {
    if (!confirm('Delete this post? This cannot be undone.')) return;
    try {
      await deleteDoc(doc(db, "posts", id));
      showToast('Post deleted.');
      loadPosts();
    } catch(e) {
      showToast('Error deleting post.');
    }
  };

  window.resetForm = function() {
    document.getElementById('postTitle').value = '';
    document.getElementById('postBody').value = '';
    document.getElementById('postImage1').value = '';
    document.getElementById('postImage2').value = '';
    document.getElementById('postImage1File').value = '';
    document.getElementById('postImage2File').value = '';
    document.getElementById('img1Preview').style.display = 'none';
    document.getElementById('img2Preview').style.display = 'none';
    document.getElementById('img1UploadStatus').style.display = 'none';
    document.getElementById('img2UploadStatus').style.display = 'none';
    document.getElementById('editId').value = '';
    document.getElementById('editorTitle').textContent = 'New Post';
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
