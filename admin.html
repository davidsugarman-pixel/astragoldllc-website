<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — AstraGold Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #8a6f2e;
      --black: #0a0a0a;
      --dark: #111111;
      --dark2: #1a1a1a;
      --dark3: #222222;
      --text: #e8e0d0;
      --text-muted: #8a8070;
      --danger: #c0392b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--black); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; min-height: 100vh; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box { background: var(--dark2); border: 1px solid #2a2a2a; border-radius: 4px; padding: 3rem; width: 100%; max-width: 400px; text-align: center; }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); margin-bottom: 0.3rem; }
    .login-sub { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2.5rem; }
    .login-box input { width: 100%; background: var(--dark3); border: 1px solid #2a2a2a; color: var(--text); padding: 0.9rem 1.2rem; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 1rem; margin-bottom: 1rem; transition: border-color 0.2s; }
    .login-box input:focus { outline: none; border-color: var(--gold); }
    .btn-gold { width: 100%; background: var(--gold); color: var(--black); border: none; padding: 0.9rem; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.8rem; display: none; }

    /* ADMIN LAYOUT */
    .admin-screen { display: none; min-height: 100vh; }
    nav { background: var(--dark); border-bottom: 1px solid #2a2a2a; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); }
    .nav-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-outline { background: none; border: 1px solid #2a2a2a; color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s, color 0.2s; text-decoration: none; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; display: grid; grid-template-columns: 1fr 360px; gap: 2rem; }
    @media (max-width: 780px) { .admin-body { grid-template-columns: 1fr; } }

    /* EDITOR */
    .panel { background: var(--dark2); border: 1px solid #2a2a2a; border-radius: 4px; padding: 2rem; }
    .panel-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #fff; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #2a2a2a; }
    .form-group { margin-bottom: 1.3rem; }
    .form-group label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; font-weight: 500; }
    .form-group input[type="text"],
    .form-group input[type="url"],
    .form-group textarea {
      width: 100%; background: var(--dark3); border: 1px solid #2a2a2a; color: var(--text); padding: 0.8rem 1rem; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 0.95rem; font-weight: 300; transition: border-color 0.2s; resize: vertical;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
    .form-group textarea { min-height: 220px; line-height: 1.7; }

    /* IMAGE UPLOAD AREA */
    .img-upload-group { margin-bottom: 1.3rem; }
    .img-upload-group label.field-label { display: block; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; font-weight: 500; }
    .img-upload-row { display: flex; gap: 0.6rem; align-items: center; }
    .upload-btn-label {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--dark3); border: 1px solid #3a3a3a; color: var(--text-muted);
      padding: 0.75rem 1rem; border-radius: 3px;
      font-family: 'Barlow', sans-serif; font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      white-space: nowrap; transition: border-color 0.2s, color 0.2s; flex-shrink: 0;
    }
    .upload-btn-label:hover { border-color: var(--gold); color: var(--gold); }
    .upload-btn-label input[type="file"] { display: none; }
    .img-url-input { flex: 1; background: var(--dark3); border: 1px solid #2a2a2a; color: var(--text); padding: 0.75rem 1rem; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 0.9rem; font-weight: 300; transition: border-color 0.2s; }
    .img-url-input:focus { outline: none; border-color: var(--gold); }
    .img-upload-status { font-size: 0.78rem; color: var(--gold); margin-top: 0.4rem; min-height: 1.2em; }
    .img-upload-progress { height: 2px; background: #2a2a2a; border-radius: 1px; margin-top: 0.3rem; overflow: hidden; display: none; }
    .img-upload-progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s; }
    .img-preview { display: none; max-height: 80px; border: 1px solid #2a2a2a; border-radius: 2px; margin-top: 0.5rem; }

    .publish-bar { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .publish-bar .btn-gold { width: auto; flex: 1; }
    .btn-reset { background: none; border: 1px solid #2a2a2a; color: var(--text-muted); padding: 0.8rem 1.5rem; border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif; font-size: 0.85rem; transition: border-color 0.2s; }
    .btn-reset:hover { border-color: #444; }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--dark2); border: 1px solid var(--gold-dim); color: var(--gold); padding: 1rem 1.5rem; border-radius: 4px; font-size: 0.85rem; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; pointer-events: none; max-width: 320px; }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* POSTS LIST */
    .post-item { border-bottom: 1px solid #222; padding: 1rem 0; }
    .post-item:last-child { border-bottom: none; }
    .post-item-title { font-weight: 500; color: #fff; font-size: 0.95rem; margin-bottom: 0.3rem; line-height: 1.3; }
    .post-item-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.6rem; }
    .post-item-actions { display: flex; gap: 0.5rem; }
    .btn-delete { background: none; border: 1px solid #3a1a1a; color: #c0392b; padding: 0.3rem 0.8rem; border-radius: 2px; font-size: 0.72rem; cursor: pointer; font-family: 'Barlow', sans-serif; letter-spacing: 0.05em; transition: background 0.2s; }
    .btn-delete:hover { background: #2a0a0a; }
    .posts-empty { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 2rem 0; }
    .spinner { width: 24px; height: 24px; border: 2px solid #2a2a2a; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 1.5rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* GALLERY UPLOAD TAB */
    .tab-bar { display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 1px solid #2a2a2a; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); padding: 0.75rem 1.5rem; font-family: 'Barlow', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: color 0.2s, border-color 0.2s; margin-bottom: -1px; }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Gallery admin */
    .gallery-drop-zone {
      border: 2px dashed #3a3a3a; border-radius: 4px; padding: 3rem 2rem; text-align: center;
      cursor: pointer; transition: border-color 0.2s; margin-bottom: 1.5rem;
    }
    .gallery-drop-zone:hover, .gallery-drop-zone.dragover { border-color: var(--gold); }
    .gallery-drop-zone input { display: none; }
    .drop-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.5; }
    .drop-text { font-size: 0.9rem; color: var(--text-muted); }
    .drop-hint { font-size: 0.75rem; color: #555; margin-top: 0.3rem; }

    .gallery-queue { display: flex; flex-direction: column; gap: 0.6rem; }
    .queue-item { display: flex; align-items: center; gap: 0.75rem; background: var(--dark3); border: 1px solid #2a2a2a; border-radius: 3px; padding: 0.6rem 0.8rem; }
    .queue-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
    .queue-name { font-size: 0.82rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .queue-progress-wrap { width: 80px; height: 3px; background: #333; border-radius: 2px; overflow: hidden; }
    .queue-progress { height: 100%; background: var(--gold); width: 0%; transition: width 0.15s; }
    .queue-status { font-size: 0.72rem; color: var(--text-muted); min-width: 3rem; text-align: right; }
    .queue-status.done { color: #4CAF7D; }
    .queue-status.error { color: var(--danger); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ASTRAGOLD LLC</div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-gold" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <nav>
    <div class="nav-logo">ASTRAGOLD — Admin</div>
    <div class="nav-actions">
      <a href="blog.html" class="btn-outline" target="_blank">View Blog</a>
      <a href="gallery.html" class="btn-outline" target="_blank">View Gallery</a>
      <button class="btn-outline" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="admin-body">
    <!-- LEFT: EDITOR + GALLERY TABS -->
    <div class="panel">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('blog')">Blog Post</button>
        <button class="tab-btn" onclick="switchTab('gallery')">Gallery Upload</button>
      </div>

      <!-- BLOG TAB -->
      <div class="tab-pane active" id="tabBlog">
        <div class="panel-title" id="editorTitle">New Post</div>
        <input type="hidden" id="editId"/>
        <div class="form-group">
          <label>Post Title</label>
          <input type="text" id="postTitle" placeholder="e.g. Spring Shipping Season Tips"/>
        </div>
        <div class="form-group">
          <label>Article Body</label>
          <textarea id="postBody" placeholder="Write your article here..."></textarea>
        </div>

        <!-- IMAGE 1 -->
        <div class="img-upload-group">
          <label class="field-label">Image 1 <span style="color:var(--text-muted);text-transform:none;font-size:0.7rem;">(optional)</span></label>
          <div class="img-upload-row">
            <label class="upload-btn-label">
              <span>📎</span> Upload
              <input type="file" id="img1File" accept="image/*" onchange="uploadBlogImage(this, 'postImage1', 'img1Status', 'img1Bar', 'img1Preview')"/>
            </label>
            <span style="color:var(--text-muted);font-size:0.78rem;flex-shrink:0;">or</span>
            <input type="url" class="img-url-input" id="postImage1" placeholder="Paste image URL"/>
          </div>
          <div class="img-upload-status" id="img1Status"></div>
          <div class="img-upload-progress" id="img1BarWrap"><div class="img-upload-progress-bar" id="img1Bar"></div></div>
          <img class="img-preview" id="img1Preview"/>
        </div>

        <!-- IMAGE 2 -->
        <div class="img-upload-group">
          <label class="field-label">Image 2 <span style="color:var(--text-muted);text-transform:none;font-size:0.7rem;">(optional)</span></label>
          <div class="img-upload-row">
            <label class="upload-btn-label">
              <span>📎</span> Upload
              <input type="file" id="img2File" accept="image/*" onchange="uploadBlogImage(this, 'postImage2', 'img2Status', 'img2Bar', 'img2Preview')"/>
            </label>
            <span style="color:var(--text-muted);font-size:0.78rem;flex-shrink:0;">or</span>
            <input type="url" class="img-url-input" id="postImage2" placeholder="Paste image URL"/>
          </div>
          <div class="img-upload-status" id="img2Status"></div>
          <div class="img-upload-progress" id="img2BarWrap"><div class="img-upload-progress-bar" id="img2Bar"></div></div>
          <img class="img-preview" id="img2Preview"/>
        </div>

        <div class="publish-bar">
          <button class="btn-gold" id="publishBtn" onclick="publishPost()">Publish Post</button>
          <button class="btn-reset" onclick="resetForm()">Clear</button>
        </div>
      </div>

      <!-- GALLERY TAB -->
      <div class="tab-pane" id="tabGallery">
        <div class="panel-title">Upload to Gallery</div>
        <label class="gallery-drop-zone" id="dropZone" for="galleryFiles">
          <div class="drop-icon">🖼️</div>
          <div class="drop-text">Click to select photos, or drag & drop here</div>
          <div class="drop-hint">JPG, PNG, WEBP — multiple files supported</div>
          <input type="file" id="galleryFiles" multiple accept="image/*" onchange="queueGalleryUploads(this.files)"/>
        </label>
        <div class="gallery-queue" id="galleryQueue"></div>
      </div>
    </div>

    <!-- RIGHT: POSTS LIST -->
    <div class="panel">
      <div class="panel-title">Published Posts</div>
      <div class="spinner" id="listSpinner"></div>
      <div id="postsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs, deleteDoc,
    doc, orderBy, query, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import {
    getStorage, ref, uploadBytesResumable, getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const ADMIN_PASSWORD = "carhauler";

  const firebaseConfig = {
    apiKey: "AIzaSyD9LUcJU8W57CYdP_xfYscxg-PzSPjTQi0",
    authDomain: "astragold-website.firebaseapp.com",
    projectId: "astragold-website",
    storageBucket: "astragold-website.firebasestorage.app",
    messagingSenderId: "982725379990",
    appId: "1:982725379990:web:191f4563c2eaf6d2aabfb7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  let posts = [];

  // ── AUTH ──────────────────────────────────────────────────
  window.login = function() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadPosts();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  };

  window.logout = function() {
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
  };

  // ── TABS ──────────────────────────────────────────────────
  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='blog')||(i===1&&tab==='gallery')));
    document.getElementById('tabBlog').classList.toggle('active', tab === 'blog');
    document.getElementById('tabGallery').classList.toggle('active', tab === 'gallery');
  };

  // ── LOAD POSTS ────────────────────────────────────────────
  async function loadPosts() {
    document.getElementById('listSpinner').style.display = 'block';
    document.getElementById('postsList').innerHTML = '';
    try {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderList();
    } catch(e) {
      document.getElementById('postsList').innerHTML =
        '<p style="color:#c0392b;font-size:.85rem;padding:1rem 0">Error loading posts. Check Firebase rules — Firestore read must be allowed.</p>';
      console.error('Firestore error:', e);
    }
    document.getElementById('listSpinner').style.display = 'none';
  }

  function renderList() {
    const el = document.getElementById('postsList');
    if (!posts.length) {
      el.innerHTML = '<div class="posts-empty">No posts yet. Write your first one!</div>';
      return;
    }
    el.innerHTML = posts.map(p => {
      const date = p.createdAt
        ? new Date(p.createdAt.seconds * 1000).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
        : 'Draft';
      return `
        <div class="post-item">
          <div class="post-item-title">${p.title}</div>
          <div class="post-item-date">${date}</div>
          <div class="post-item-actions">
            <button class="btn-delete" onclick="deletePost('${p.id}')">Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  // ── BLOG IMAGE UPLOAD ─────────────────────────────────────
  window.uploadBlogImage = function(fileInput, urlInputId, statusId, barId, previewId) {
    const file = fileInput.files[0];
    if (!file) return;

    const statusEl = document.getElementById(statusId);
    const barWrap = document.getElementById(barId + 'Wrap');
    const barEl = document.getElementById(barId);
    const previewEl = document.getElementById(previewId);

    statusEl.textContent = 'Uploading…';
    barWrap.style.display = 'block';
    barEl.style.width = '0%';

    const path = `blog_images/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const task = uploadBytesResumable(ref(storage, path), file);

    task.on('state_changed',
      snap => {
        const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
        barEl.style.width = pct + '%';
        statusEl.textContent = `Uploading… ${pct}%`;
      },
      err => {
        statusEl.textContent = '✗ Upload failed: ' + err.message;
        barWrap.style.display = 'none';
        console.error('Storage upload error:', err);
      },
      async () => {
        const url = await getDownloadURL(task.snapshot.ref);
        document.getElementById(urlInputId).value = url;
        statusEl.textContent = '✓ Uploaded';
        barEl.style.width = '100%';
        setTimeout(() => { barWrap.style.display = 'none'; }, 800);
        previewEl.src = url;
        previewEl.style.display = 'block';
      }
    );
  };

  // ── PUBLISH POST ──────────────────────────────────────────
  window.publishPost = async function() {
    const title = document.getElementById('postTitle').value.trim();
    const body = document.getElementById('postBody').value.trim();
    const image1 = document.getElementById('postImage1').value.trim();
    const image2 = document.getElementById('postImage2').value.trim();

    if (!title) { showToast('Please enter a title.'); return; }
    if (!body) { showToast('Please write some content.'); return; }

    const btn = document.getElementById('publishBtn');
    btn.textContent = 'Publishing...';
    btn.disabled = true;

    try {
      await addDoc(collection(db, "posts"), {
        title,
        body,
        image1: image1 || null,
        image2: image2 || null,
        createdAt: serverTimestamp()
      });
      showToast('✓ Post published!');
      resetForm();
      loadPosts();
    } catch(e) {
      showToast('Error publishing: ' + e.message);
      console.error('Publish error:', e);
    }
    btn.textContent = 'Publish Post';
    btn.disabled = false;
  };

  // ── GALLERY UPLOAD ────────────────────────────────────────
  window.queueGalleryUploads = async function(files) {
    if (!files.length) return;
    const queue = document.getElementById('galleryQueue');

    for (const file of Array.from(files)) {
      const id = 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const thumbUrl = URL.createObjectURL(file);
      queue.insertAdjacentHTML('beforeend', `
        <div class="queue-item" id="${id}">
          <img class="queue-thumb" src="${thumbUrl}" alt="" />
          <span class="queue-name">${file.name}</span>
          <div class="queue-progress-wrap"><div class="queue-progress" id="${id}_bar"></div></div>
          <span class="queue-status" id="${id}_status">Waiting…</span>
        </div>`);

      const path = `gallery/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const task = uploadBytesResumable(ref(storage, path), file);

      await new Promise((resolve) => {
        task.on('state_changed',
          snap => {
            const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
            document.getElementById(id + '_bar').style.width = pct + '%';
            document.getElementById(id + '_status').textContent = pct + '%';
          },
          err => {
            const s = document.getElementById(id + '_status');
            s.textContent = 'Error';
            s.classList.add('error');
            console.error('Gallery upload error:', err);
            resolve();
          },
          async () => {
            const url = await getDownloadURL(task.snapshot.ref);
            await addDoc(collection(db, "gallery"), {
              url,
              storagePath: path,
              caption: '',
              createdAt: serverTimestamp()
            });
            const s = document.getElementById(id + '_status');
            s.textContent = '✓ Done';
            s.classList.add('done');
            document.getElementById(id + '_bar').style.width = '100%';
            resolve();
          }
        );
      });
    }
    showToast('Gallery upload complete!');
  };

  // Drag & drop support
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    window.queueGalleryUploads(e.dataTransfer.files);
  });

  // ── DELETE POST ───────────────────────────────────────────
  window.deletePost = async function(id) {
    if (!confirm('Delete this post? Cannot be undone.')) return;
    try {
      await deleteDoc(doc(db, "posts", id));
      showToast('Post deleted.');
      loadPosts();
    } catch(e) { showToast('Error deleting post.'); }
  };

  // ── RESET ─────────────────────────────────────────────────
  window.resetForm = function() {
    ['postTitle','postBody','postImage1','postImage2','editId','img1File','img2File'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    ['img1Status','img2Status'].forEach(id => { document.getElementById(id).textContent = ''; });
    ['img1Preview','img2Preview'].forEach(id => {
      const el = document.getElementById(id);
      el.src = '';
      el.style.display = 'none';
    });
    ['img1BarWrap','img2BarWrap'].forEach(id => { document.getElementById(id).style.display = 'none'; });
    document.getElementById('editorTitle').textContent = 'New Post';
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
