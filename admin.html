<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — AstraGold</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#8a6f2e;--black:#0a0a0a;--dark:#111111;--dark2:#1a1a1a;--dark3:#222222;--text:#e8e0d0;--text-muted:#8a8070;--danger:#c0392b;--green:#4CAF7D; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;}
    .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
    .login-box{background:var(--dark2);border:1px solid #2a2a2a;border-radius:4px;padding:3rem;width:100%;max-width:400px;text-align:center;}
    .login-logo{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);margin-bottom:0.3rem;}
    .login-sub{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2.5rem;}
    .login-box input{width:100%;background:var(--dark3);border:1px solid #2a2a2a;color:var(--text);padding:0.9rem 1.2rem;border-radius:3px;font-family:'Barlow',sans-serif;font-size:1rem;margin-bottom:1rem;transition:border-color 0.2s;}
    .login-box input:focus{outline:none;border-color:var(--gold);}
    .btn-gold{width:100%;background:var(--gold);color:var(--black);border:none;padding:0.9rem;border-radius:3px;font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
    .btn-gold:hover{background:var(--gold-light);}
    .btn-gold:disabled{opacity:0.5;cursor:not-allowed;}
    .login-error{color:#e74c3c;font-size:0.85rem;margin-top:0.8rem;display:none;}
    .admin-screen{display:none;min-height:100vh;}
    nav{background:var(--dark);border-bottom:1px solid #2a2a2a;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);}
    .nav-actions{display:flex;gap:1rem;align-items:center;}
    .btn-outline{background:none;border:1px solid #2a2a2a;color:var(--text-muted);padding:0.5rem 1rem;border-radius:3px;font-family:'Barlow',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,color 0.2s;text-decoration:none;}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
    .admin-body{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;display:grid;grid-template-columns:1fr 360px;gap:2rem;}
    @media(max-width:780px){.admin-body{grid-template-columns:1fr;}}
    .tab-bar{display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:1.75rem;}
    .tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);padding:0.75rem 1.5rem;font-family:'Barlow',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:color 0.2s,border-color 0.2s;margin-bottom:-1px;}
    .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}
    .panel{background:var(--dark2);border:1px solid #2a2a2a;border-radius:4px;padding:2rem;}
    .panel-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:#fff;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #2a2a2a;}
    .form-group{margin-bottom:1.3rem;}
    .form-group label{display:block;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;font-weight:500;}
    .form-group input[type="text"],.form-group input[type="url"],.form-group textarea{width:100%;background:var(--dark3);border:1px solid #2a2a2a;color:var(--text);padding:0.8rem 1rem;border-radius:3px;font-family:'Barlow',sans-serif;font-size:0.95rem;font-weight:300;transition:border-color 0.2s;resize:vertical;}
    .form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);}
    .form-group textarea{min-height:200px;line-height:1.7;}
    .img-upload-group{margin-bottom:1.3rem;}
    .field-lbl{display:block;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;font-weight:500;}
    .img-row{display:flex;gap:0.6rem;align-items:center;}
    .upload-lbl{display:inline-flex;align-items:center;gap:0.4rem;background:var(--dark3);border:1px solid #3a3a3a;color:var(--text-muted);padding:0.75rem 1rem;border-radius:3px;font-family:'Barlow',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:border-color 0.2s,color 0.2s;flex-shrink:0;}
    .upload-lbl:hover{border-color:var(--gold);color:var(--gold);}
    .upload-lbl input{display:none;}
    .img-url{flex:1;background:var(--dark3);border:1px solid #2a2a2a;color:var(--text);padding:0.75rem 1rem;border-radius:3px;font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:300;transition:border-color 0.2s;}
    .img-url:focus{outline:none;border-color:var(--gold);}
    .img-status{font-size:0.75rem;min-height:1.1em;margin-top:0.35rem;}
    .img-status.uploading{color:var(--gold);}
    .img-status.done{color:var(--green);}
    .img-status.err{color:var(--danger);}
    .img-thumb{display:none;max-height:70px;border:1px solid #2a2a2a;border-radius:2px;margin-top:0.5rem;}
    .publish-bar{display:flex;gap:1rem;margin-top:1.5rem;}
    .publish-bar .btn-gold{width:auto;flex:1;}
    .btn-reset{background:none;border:1px solid #2a2a2a;color:var(--text-muted);padding:0.8rem 1.5rem;border-radius:3px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.85rem;transition:border-color 0.2s;}
    .btn-reset:hover{border-color:#444;}
    .drop-zone{border:2px dashed #3a3a3a;border-radius:4px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color 0.2s;margin-bottom:1.5rem;}
    .drop-zone:hover,.drop-zone.over{border-color:var(--gold);}
    .drop-zone input{display:none;}
    .drop-icon{font-size:2rem;opacity:0.4;margin-bottom:0.75rem;}
    .drop-text{font-size:0.9rem;color:var(--text-muted);}
    .drop-hint{font-size:0.72rem;color:#555;margin-top:0.3rem;}
    .upload-queue{display:flex;flex-direction:column;gap:0.5rem;}
    .q-item{display:flex;align-items:center;gap:0.75rem;background:var(--dark3);border:1px solid #2a2a2a;border-radius:3px;padding:0.6rem 0.8rem;}
    .q-thumb{width:40px;height:40px;object-fit:cover;border-radius:2px;flex-shrink:0;}
    .q-name{font-size:0.8rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);}
    .q-bar-wrap{width:80px;height:3px;background:#333;border-radius:2px;overflow:hidden;flex-shrink:0;}
    .q-bar{height:100%;background:var(--gold);width:0%;transition:width 0.1s;}
    .q-status{font-size:0.72rem;min-width:3.5rem;text-align:right;color:var(--text-muted);}
    .q-status.done{color:var(--green);}
    .q-status.err{color:var(--danger);}
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--dark2);border:1px solid var(--gold-dim);color:var(--gold);padding:1rem 1.5rem;border-radius:4px;font-size:0.85rem;font-weight:500;opacity:0;transform:translateY(10px);transition:all 0.3s;z-index:999;pointer-events:none;max-width:320px;}
    .toast.show{opacity:1;transform:translateY(0);}
    .post-item{border-bottom:1px solid #222;padding:1rem 0;}
    .post-item:last-child{border-bottom:none;}
    .post-item-title{font-weight:500;color:#fff;font-size:0.95rem;margin-bottom:0.3rem;line-height:1.3;}
    .post-item-date{font-size:0.75rem;color:var(--text-muted);margin-bottom:0.6rem;}
    .btn-delete{background:none;border:1px solid #3a1a1a;color:#c0392b;padding:0.3rem 0.8rem;border-radius:2px;font-size:0.72rem;cursor:pointer;font-family:'Barlow',sans-serif;letter-spacing:0.05em;transition:background 0.2s;}
    .btn-delete:hover{background:#2a0a0a;}
    .posts-empty{color:var(--text-muted);font-size:0.85rem;text-align:center;padding:2rem 0;}
    .spinner{width:24px;height:24px;border:2px solid #2a2a2a;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:1.5rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">ASTRAGOLD LLC</div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" id="passwordInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-gold" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<div class="admin-screen" id="adminScreen">
  <nav>
    <div class="nav-logo">ASTRAGOLD — Admin</div>
    <div class="nav-actions">
      <a href="blog.html" class="btn-outline" target="_blank">View Blog</a>
      <a href="gallery.html" class="btn-outline" target="_blank">View Gallery</a>
      <button class="btn-outline" onclick="logout()">Sign Out</button>
    </div>
  </nav>
  <div class="admin-body">
    <div class="panel">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('blog')">📝 Blog Post</button>
        <button class="tab-btn" onclick="switchTab('gallery')">🖼️ Gallery Upload</button>
      </div>

      <!-- BLOG TAB -->
      <div class="tab-pane active" id="tabBlog">
        <div class="panel-title" id="editorTitle">New Post</div>
        <input type="hidden" id="editId"/>
        <div class="form-group">
          <label>Post Title</label>
          <input type="text" id="postTitle" placeholder="e.g. Spring Shipping Season Tips"/>
        </div>
        <div class="form-group">
          <label>Article Body</label>
          <textarea id="postBody" placeholder="Write your article here..."></textarea>
        </div>
        <div class="img-upload-group">
          <span class="field-lbl">Image 1 <span style="color:var(--text-muted);text-transform:none;font-size:0.7rem;">(optional)</span></span>
          <div class="img-row">
            <label class="upload-lbl">📎 Upload<input type="file" accept="image/*" onchange="uploadImg(this,'postImage1','s1','t1')"/></label>
            <span style="color:var(--text-muted);font-size:0.78rem;flex-shrink:0;">or</span>
            <input type="url" class="img-url" id="postImage1" placeholder="Paste image URL"/>
          </div>
          <div class="img-status" id="s1"></div>
          <img class="img-thumb" id="t1"/>
        </div>
        <div class="img-upload-group">
          <span class="field-lbl">Image 2 <span style="color:var(--text-muted);text-transform:none;font-size:0.7rem;">(optional)</span></span>
          <div class="img-row">
            <label class="upload-lbl">📎 Upload<input type="file" accept="image/*" onchange="uploadImg(this,'postImage2','s2','t2')"/></label>
            <span style="color:var(--text-muted);font-size:0.78rem;flex-shrink:0;">or</span>
            <input type="url" class="img-url" id="postImage2" placeholder="Paste image URL"/>
          </div>
          <div class="img-status" id="s2"></div>
          <img class="img-thumb" id="t2"/>
        </div>
        <div class="publish-bar">
          <button class="btn-gold" id="publishBtn" onclick="publishPost()">Publish Post</button>
          <button class="btn-reset" onclick="resetForm()">Clear</button>
        </div>
      </div>

      <!-- GALLERY TAB -->
      <div class="tab-pane" id="tabGallery">
        <div class="panel-title">Upload to Gallery</div>
        <label class="drop-zone" id="dropZone" for="galleryFiles">
          <div class="drop-icon">🖼️</div>
          <div class="drop-text">Click to select photos, or drag & drop here</div>
          <div class="drop-hint">JPG, PNG, WEBP · multiple files OK · uploads to Google Drive</div>
          <input type="file" id="galleryFiles" multiple accept="image/*" onchange="queueGallery(this.files)"/>
        </label>
        <div class="upload-queue" id="galleryQueue"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Published Posts</div>
      <div class="spinner" id="listSpinner"></div>
      <div id="postsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs, deleteDoc,
    doc, orderBy, query, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const ADMIN_PASSWORD = "carhauler";

  // Same Apps Script endpoint already used by fleet app — free, on your Google Workspace
  const DRIVE_URL = 'https://script.google.com/a/macros/astragoldllc.com/s/AKfycbxP0kmxBvfqtFbcXwPuLZC6ONYkiuzYExxW6hlfDWMfwdvgSx15kQW9KOyWnQt_sPu0/exec';

  const firebaseConfig = {
    apiKey: "AIzaSyD9LUcJU8W57CYdP_xfYscxg-PzSPjTQi0",
    authDomain: "astragold-website.firebaseapp.com",
    projectId: "astragold-website",
    storageBucket: "astragold-website.firebasestorage.app",
    messagingSenderId: "982725379990",
    appId: "1:982725379990:web:191f4563c2eaf6d2aabfb7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── AUTH ──────────────────────────────────────────────────
  window.login = function() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadPosts();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  };
  window.logout = function() {
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  };

  // ── TABS ──────────────────────────────────────────────────
  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) =>
      b.classList.toggle('active',(tab==='blog'&&i===0)||(tab==='gallery'&&i===1)));
    document.getElementById('tabBlog').classList.toggle('active', tab==='blog');
    document.getElementById('tabGallery').classList.toggle('active', tab==='gallery');
  };

  // ── CORE: Upload file to Google Drive via Apps Script ─────
  // Identical pattern to the fleet app that already works
  function uploadToDrive(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const resp = await fetch(DRIVE_URL, {
            method: 'POST',
            body: JSON.stringify({
              fileName: file.name,
              mimeType: file.type,
              fileData: e.target.result  // base64 data URL
            })
          });
          const result = await resp.json();
          if (result.status === 'success') {
            resolve(result.fileUrl);
          } else {
            reject(new Error(result.message || 'Upload failed'));
          }
        } catch(err) { reject(err); }
      };
      reader.onerror = () => reject(new Error('File read failed'));
      reader.readAsDataURL(file);
    });
  }

  // ── BLOG IMAGE UPLOAD ─────────────────────────────────────
  window.uploadImg = async function(fileInput, urlId, statusId, thumbId) {
    const file = fileInput.files[0];
    if (!file) return;
    const sEl = document.getElementById(statusId);
    const tEl = document.getElementById(thumbId);
    sEl.className = 'img-status uploading';
    sEl.textContent = 'Uploading to Drive…';
    try {
      const url = await uploadToDrive(file);
      document.getElementById(urlId).value = url;
      sEl.className = 'img-status done';
      sEl.textContent = '✓ Uploaded to Drive';
      tEl.src = url; tEl.style.display = 'block';
    } catch(err) {
      sEl.className = 'img-status err';
      sEl.textContent = '✗ ' + err.message;
      console.error(err);
    }
    fileInput.value = '';
  };

  // ── GALLERY UPLOAD ────────────────────────────────────────
  window.queueGallery = async function(files) {
    if (!files.length) return;
    const queue = document.getElementById('galleryQueue');
    for (const file of Array.from(files)) {
      const uid = 'q' + Date.now() + Math.random().toString(36).slice(2,5);
      queue.insertAdjacentHTML('beforeend', `
        <div class="q-item" id="${uid}">
          <img class="q-thumb" src="${URL.createObjectURL(file)}"/>
          <span class="q-name">${file.name}</span>
          <div class="q-bar-wrap"><div class="q-bar" id="${uid}_b"></div></div>
          <span class="q-status" id="${uid}_s">Uploading…</span>
        </div>`);
      // Animate progress bar (Drive doesn't stream progress)
      let pct = 0;
      const bar = document.getElementById(uid + '_b');
      const ticker = setInterval(() => { pct = Math.min(pct+7, 88); bar.style.width = pct+'%'; }, 350);
      try {
        const url = await uploadToDrive(file);
        clearInterval(ticker);
        bar.style.width = '100%';
        await addDoc(collection(db, "gallery"), {
          url, fileName: file.name, caption: '', createdAt: serverTimestamp()
        });
        const s = document.getElementById(uid + '_s');
        s.textContent = '✓ Done'; s.classList.add('done');
        setTimeout(() => document.getElementById(uid)?.remove(), 2500);
      } catch(err) {
        clearInterval(ticker);
        const s = document.getElementById(uid + '_s');
        s.textContent = 'Error'; s.classList.add('err');
        console.error('Gallery upload error:', err);
      }
    }
    showToast('Gallery upload complete!');
  };

  // Drag & drop
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); window.queueGallery(e.dataTransfer.files); });

  // ── POSTS ─────────────────────────────────────────────────
  async function loadPosts() {
    document.getElementById('listSpinner').style.display = 'block';
    document.getElementById('postsList').innerHTML = '';
    try {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      const snap = await getDocs(q);
      const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const el = document.getElementById('postsList');
      if (!posts.length) { el.innerHTML = '<div class="posts-empty">No posts yet.</div>'; }
      else {
        el.innerHTML = posts.map(p => {
          const date = p.createdAt
            ? new Date(p.createdAt.seconds*1000).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})
            : 'Draft';
          return `<div class="post-item">
            <div class="post-item-title">${p.title}</div>
            <div class="post-item-date">${date}</div>
            <button class="btn-delete" onclick="deletePost('${p.id}')">Delete</button>
          </div>`;
        }).join('');
      }
    } catch(e) {
      document.getElementById('postsList').innerHTML =
        `<p style="color:#c0392b;font-size:.82rem;line-height:1.7">
          Error loading posts.<br>
          <small>Fix: Firebase Console → Firestore Database → Rules →<br>
          set <code style="color:var(--gold)">allow read, write: if true;</code> → Publish</small>
        </p>`;
      console.error('Firestore:', e);
    }
    document.getElementById('listSpinner').style.display = 'none';
  }

  window.publishPost = async function() {
    const title = document.getElementById('postTitle').value.trim();
    const body  = document.getElementById('postBody').value.trim();
    const image1 = document.getElementById('postImage1').value.trim();
    const image2 = document.getElementById('postImage2').value.trim();
    if (!title) { showToast('Please enter a title.'); return; }
    if (!body)  { showToast('Please write some content.'); return; }
    const btn = document.getElementById('publishBtn');
    btn.textContent = 'Publishing…'; btn.disabled = true;
    try {
      await addDoc(collection(db, "posts"), {
        title, body,
        image1: image1 || null,
        image2: image2 || null,
        createdAt: serverTimestamp()
      });
      showToast('✓ Post published!');
      resetForm(); loadPosts();
    } catch(e) {
      showToast('Error: ' + e.message);
      console.error(e);
    }
    btn.textContent = 'Publish Post'; btn.disabled = false;
  };

  window.deletePost = async function(id) {
    if (!confirm('Delete this post?')) return;
    try { await deleteDoc(doc(db, "posts", id)); showToast('Deleted.'); loadPosts(); }
    catch(e) { showToast('Delete failed.'); }
  };

  window.resetForm = function() {
    ['postTitle','postBody','postImage1','postImage2'].forEach(id => {
      const el = document.getElementById(id); if(el) el.value='';
    });
    ['s1','s2'].forEach(id => { const el=document.getElementById(id); if(el){el.textContent='';el.className='img-status';} });
    ['t1','t2'].forEach(id => { const el=document.getElementById(id); if(el){el.src='';el.style.display='none';} });
    document.getElementById('editorTitle').textContent='New Post';
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
